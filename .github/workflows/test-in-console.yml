name: Test In Console

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.head_ref }}-test-in-console
      cancel-in-progress: true
    timeout-minutes: 60

    env:
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true
      TEST_PACKAGES_EXCLUDE: stylus,roles

    steps:
      - run: sudo apt-get update && sudo apt-get install -y libnss3 g++-12 chromium-browser

      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - uses: actions/cache@v3
        with:
          path: |
            ~/.npm
            .meteor
            .babel-cache
            dev_bundle
          key: ${{ runner.os }}-node-${{ hashFiles('meteor', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - run: npm install

      - run: ./packages/test-in-console/run.sh