name: Test In Console

on: [pull_request]

jobs:
  test-in-console:
    runs-on: ubuntu-22.04
    concurrency:
      group: ${{ github.head_ref }}-test-in-console
      cancel-in-progress: true
    timeout-minutes: 60

    env:
      DISPLAY: 127.0.0.53:0
      TEST_PACKAGES_EXCLUDE: stylus,roles
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true
      PUPPETEER_PRODUCT: firefox
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/firefox
      URL: http://localhost:4096/
      METEOR_PACKAGE_DIRS: packages/deprecated

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22
      - run: npm install -g puppeteer@23.6.0

      - uses: actions/download-artifact@v3
        with:
          name: dev-bundle
          path: ./dev_bundle
        continue-on-error: true

      - run: cat /etc/resolv.conf
      
      - run: |
          whereis firefox
          whereis chromium
          whereis google-chrome
          whereis chrome

      - run: ./packages/test-in-console/run.sh
      
      - if: ${{ always() }}
        uses: actions/upload-artifact@v3
        with:
          name: dev_bundle
          path: ./dev_bundle